<!-- 필드 오류와 넌필드 오류를 출력한다. -->
{% load static %}
{% if form.errors %}
<div class="Error_Fields">
    <header>
        <img src="{% static 'assets/error.png' %}"/>
        <span>에러 경고문</span>
    </header>
    {% for field in form %}
    <!-- 필드 오류 -->
    {% if field.errors %}
    <div>
        <strong>{{ field.label }}</strong>
        {{ field.errors }}
    </div>
    {% endif %}
    {% endfor %}
    <!-- 넌필드 오류 -->
    {% for error in form.non_field_errors %}
    <div>
        <strong>알림</strong>
        <ul>
            <li>{{ error }}</li>
        </ul>
    </div>
    {% endfor %}
</div>
{% endif %}
